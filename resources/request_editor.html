<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP 请求</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 20px 24px;
      font-family: var(--vscode-font-family);
      font-size: 13px;
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
    }
    .section {
      margin-bottom: 24px;
      padding: 16px;
      background: var(--vscode-editor-inactiveSelectionBackground);
      border-radius: 8px;
      border: 1px solid var(--vscode-widget-border);
    }
    .section-title {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 12px;
      color: var(--vscode-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }
    .method-select {
      width: 100px;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }
    .method-select:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .url-wrap { display: flex; flex: 1; align-items: center; gap: 0; min-width: 0; }
    .url-env-select {
      flex-shrink: 0;
      min-width: 140px;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .url-env-select:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .url-env-select.hidden { display: none !important; }
    .url-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-size: 13px;
      min-width: 0;
    }
    .url-input.with-base { border-radius: 0 6px 6px 0; border-left: none; }
    .url-input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .btn {
      padding: 8px 16px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { background: var(--vscode-button-hoverBackground); opacity: 0.95; }
    .btn-secondary {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }
    .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground); }
    .header-row, .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }
    .header-row input, .form-row input {
      padding: 6px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-size: 12px;
    }
    .header-row input:focus, .form-row input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .form-row input:first-child { flex: 0 0 120px; }
    .header-key-wrap { position: relative; flex: 0 0 180px; }
    .header-key-wrap .header-key { width: 100%; }
    .header-dropdown {
      position: absolute; left: 0; right: 0; top: 100%; margin-top: 4px;
      max-height: 180px; overflow-y: auto; z-index: 1000;
      background: var(--vscode-dropdown-background);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: 6px;
      box-shadow: 0 8px 24px var(--vscode-widget-shadow);
    }
    .header-dropdown-option {
      padding: 6px 12px; cursor: pointer; font-size: 12px;
      color: var(--vscode-dropdown-foreground);
      transition: background 0.1s;
    }
    .header-dropdown-option:hover { background: var(--vscode-list-hoverBackground); }
    .form-row input:nth-child(2), .header-row .header-value { flex: 1; }
    .form-row .type-select {
      width: 80px; flex: 0 0 80px; padding: 6px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
    }
    .header-add-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .header-add-actions .header-preset-select {
      min-width: 180px; padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .header-add-actions .header-custom-input {
      min-width: 120px; padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .header-add-actions .add-btn { margin-top: 0; }
    .add-btn { padding: 6px 12px; font-size: 12px; margin-top: 6px; }
    .remove-btn {
      padding: 6px 10px;
      background: transparent;
      color: var(--vscode-errorForeground);
      font-size: 12px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .remove-btn:hover { background: var(--vscode-inputValidation-errorBackground); }
    .body-type-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .body-type-tab {
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 12px;
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .body-type-tab:hover { background: var(--vscode-button-secondaryHoverBackground); }
    .body-type-tab.active {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border-color: var(--vscode-focusBorder);
    }
    .body-panel { display: none; }
    .body-panel.active { display: block; }
    .monaco-container {
      width: 100%; height: 180px;
      border: 1px solid var(--vscode-input-border);
      border-radius: 8px;
      overflow: hidden;
    }
    .file-input-wrap {
      padding: 32px 24px;
      border: 2px dashed var(--vscode-input-border);
      border-radius: 8px;
      text-align: center;
      background: var(--vscode-input-background);
      transition: border-color 0.2s, background 0.2s;
    }
    .file-input-wrap:hover { border-color: var(--vscode-focusBorder); background: var(--vscode-list-hoverBackground); }
    .file-input-wrap #fileName { display: block; margin-top: 8px; font-size: 12px; color: var(--vscode-descriptionForeground); }
    .file-input-wrap input[type=file] { display: none; }
    .response-area {
      background: var(--vscode-textBlockQuote-background);
      border-radius: 8px;
      padding: 14px;
      border: 1px solid var(--vscode-widget-border);
    }
    .response-status {
      padding: 8px 0;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .response-status.success { color: var(--vscode-testing-iconPassed); }
    .response-status.error { color: var(--vscode-errorForeground); }
    .response-body {
      white-space: pre-wrap;
      word-break: break-all;
      padding: 12px;
      background: var(--vscode-editor-background);
      border-radius: 6px;
      max-height: 320px;
      overflow-y: auto;
      font-size: 12px;
      font-family: var(--vscode-editor-font-family);
      line-height: 1.5;
      border: 1px solid var(--vscode-input-border);
    }
    .body-response-layout {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }
    .body-response-layout .section {
      flex: 1;
      margin-bottom: 0;
      min-width: 0;
    }
    .body-response-layout .monaco-container {
      height: 280px;
    }
    .body-response-layout .response-body {
      min-height: 240px;
      max-height: 360px;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">请求</div>
    <div class="row">
      <select class="method-select" id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="PATCH">PATCH</option>
        <option value="DELETE">DELETE</option>
      </select>
      <div class="url-wrap">
        <select class="url-env-select hidden" id="urlEnvSelect" title="选择环境（baseUrl）"></select>
        <input type="text" class="url-input" id="urlPath" placeholder="路径，如 /users 或 /api/users/1" />
      </div>
      <button class="btn" id="sendBtn">发送</button>
      <button class="btn btn-secondary" id="saveBtn">保存</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">请求头</div>
    <div id="headers"></div>
    <div class="header-add-actions">
      <select class="header-preset-select" id="headerPresetSelect">
        <option value="">选择常用请求头...</option>
      </select>
      <button class="btn add-btn btn-secondary" id="addHeader">添加请求头</button>
      <input type="text" class="header-custom-input" id="headerCustomInput" placeholder="自定义请求头名" />
      <button class="btn add-btn btn-secondary" id="addCustomHeader">添加自定义头</button>
    </div>
  </div>

  <div class="body-response-layout">
  <div class="section">
    <div class="section-title">请求体</div>
    <div class="body-type-tabs">
      <button class="body-type-tab" data-type="form-data">form-data</button>
      <button class="body-type-tab" data-type="x-www-form-urlencoded">x-www-form-urlencoded</button>
      <button class="body-type-tab active" data-type="json">JSON</button>
      <button class="body-type-tab" data-type="xml">XML</button>
      <button class="body-type-tab" data-type="raw">Raw</button>
      <button class="body-type-tab" data-type="binary">Binary</button>
      <button class="body-type-tab" data-type="graphql">GraphQL</button>
    </div>

    <div id="panel-form-data" class="body-panel">
      <div id="formDataRows"></div>
      <button class="btn add-btn btn-secondary" id="addFormData">+ 添加字段</button>
    </div>

    <div id="panel-x-www-form-urlencoded" class="body-panel">
      <div id="formUrlEncodedRows"></div>
      <button class="btn add-btn btn-secondary" id="addFormUrlEncoded">+ 添加字段</button>
    </div>

    <div id="panel-json" class="body-panel active">
      <div id="bodyJson" class="monaco-container"></div>
    </div>

    <div id="panel-xml" class="body-panel">
      <div id="bodyXml" class="monaco-container"></div>
    </div>

    <div id="panel-raw" class="body-panel">
      <div id="bodyRaw" class="monaco-container"></div>
    </div>

    <div id="panel-binary" class="body-panel">
      <div class="file-input-wrap">
        <input type="file" id="fileInput" />
        <span id="fileName">选择文件...</span>
        <button class="btn add-btn btn-secondary" id="selectFile" style="margin-top:8px">选择文件</button>
      </div>
    </div>

    <div id="panel-graphql" class="body-panel">
      <div id="bodyGraphql" class="monaco-container"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">响应</div>
    <div class="response-area">
      <div class="response-status" id="responseStatus">未发送</div>
      <div style="font-size:11px;margin-bottom:8px;color:var(--vscode-descriptionForeground)">响应体</div>
      <pre class="response-body" id="responseBody">发送请求后显示响应</pre>
    </div>
  </div>
  </div>

  <script src="{{MONACO_URI}}/vs/loader.js"></script>
  <script>
    const MONACO_URI = '{{MONACO_URI}}';
    const vscode = acquireVsCodeApi();

    let currentBodyType = 'json';
    let binaryBase64 = '';
    let editors = { json: null, xml: null, raw: null, graphql: null };

    const methodSelect = document.getElementById('method');
    const urlEnvSelect = document.getElementById('urlEnvSelect');
    const urlPath = document.getElementById('urlPath');
    let environments = [];
    const headersEl = document.getElementById('headers');
    const responseStatus = document.getElementById('responseStatus');
    const responseBody = document.getElementById('responseBody');

    function getBodyPanels() {
      return {
        'form-data': document.getElementById('panel-form-data'),
        'x-www-form-urlencoded': document.getElementById('panel-x-www-form-urlencoded'),
        'json': document.getElementById('panel-json'),
        'xml': document.getElementById('panel-xml'),
        'raw': document.getElementById('panel-raw'),
        'binary': document.getElementById('panel-binary'),
        'graphql': document.getElementById('panel-graphql')
      };
    }

    function switchBodyType(type) {
      currentBodyType = type;
      document.querySelectorAll('.body-type-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-type="' + type + '"]').classList.add('active');
      Object.entries(getBodyPanels()).forEach(([k, el]) => {
        el.classList.toggle('active', k === type);
      });
    }

    document.querySelectorAll('.body-type-tab').forEach(tab => {
      tab.onclick = () => switchBodyType(tab.dataset.type);
    });

    function getHeaders() {
      const h = {};
      headersEl.querySelectorAll('.header-row').forEach(r => {
        const keyInput = r.querySelector('.header-key');
        const valueInput = r.querySelector('.header-value');
        const k = keyInput ? keyInput.value.trim() : '';
        const v = valueInput ? valueInput.value.trim() : '';
        if (k) h[k] = v;
      });
      return h;
    }

    const COMMON_HEADERS = ['Accept','Accept-Charset','Accept-Encoding','Accept-Language','Authorization','Cache-Control','Content-Type','Cookie','Host','Origin','Referer','User-Agent','X-API-Key','X-Auth-Token','X-Requested-With','X-CSRF-Token'];

    (function initHeaderPresetSelect() {
      const sel = document.getElementById('headerPresetSelect');
      COMMON_HEADERS.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = h;
        sel.appendChild(opt);
      });
    })();

    function addHeaderRow(key = '', value = '') {
      const row = document.createElement('div');
      row.className = 'header-row';
      row.innerHTML = '<div class="header-key-wrap"><input type="text" class="header-key" placeholder="选择或输入请求头" value="' + escapeHtml(key) + '"><div class="header-dropdown" style="display:none"></div></div><input type="text" class="header-value" placeholder="值" value="' + escapeHtml(value) + '"><button class="btn remove-btn" type="button">删除</button>';
      const keyWrap = row.querySelector('.header-key-wrap');
      const keyInput = row.querySelector('.header-key');
      const dropdown = row.querySelector('.header-dropdown');
      function filterOptions() {
        const q = keyInput.value.trim().toLowerCase();
        const opts = q ? COMMON_HEADERS.filter(h => h.toLowerCase().includes(q)) : COMMON_HEADERS;
        dropdown.innerHTML = opts.map(h => '<div class="header-dropdown-option">' + escapeHtml(h) + '</div>').join('');
        dropdown.style.display = opts.length ? 'block' : 'none';
        dropdown.querySelectorAll('.header-dropdown-option').forEach(el => {
          el.onclick = () => { keyInput.value = el.textContent; dropdown.style.display = 'none'; keyInput.focus(); };
        });
      }
      keyInput.onfocus = filterOptions;
      keyInput.oninput = filterOptions;
      keyInput.onblur = () => setTimeout(() => dropdown.style.display = 'none', 150);
      row.querySelector('.remove-btn').onclick = () => row.remove();
      headersEl.appendChild(row);
    }

    function escapeHtml(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function addFormDataRow(item = { key: '', value: '', type: 'text', fileName: '', fileBase64: '' }) {
      const row = document.createElement('div');
      row.className = 'form-row';
      const typeOpts = '<option value="text"' + (item.type === 'text' ? ' selected' : '') + '>文本</option><option value="file"' + (item.type === 'file' ? ' selected' : '') + '>文件</option>';
      row.innerHTML = '<input type="text" placeholder="键" value="' + escapeHtml(item.key) + '"><input type="text" placeholder="值" class="form-value" value="' + escapeHtml(item.type === 'text' ? item.value : '') + '"><span class="form-file-info" style="display:none;flex:1;font-size:12px;color:var(--vscode-descriptionForeground)"></span><input type="file" class="form-file-input" style="display:none"><button class="btn add-btn btn-secondary form-file-btn" style="display:none" type="button">选择文件</button><select class="type-select form-type">' + typeOpts + '</select><button class="btn remove-btn" type="button">删除</button>';
      const typeSel = row.querySelector('.form-type');
      const valueInput = row.querySelector('.form-value');
      const fileInfo = row.querySelector('.form-file-info');
      const fileInput = row.querySelector('.form-file-input');
      const fileBtn = row.querySelector('.form-file-btn');
      row.dataset.fileBase64 = item.fileBase64 || '';
      row.dataset.fileName = item.fileName || '';
      function updateUI() {
        const isFile = typeSel.value === 'file';
        valueInput.style.display = isFile ? 'none' : '';
        fileInfo.style.display = isFile ? 'inline' : 'none';
        fileBtn.style.display = isFile ? 'inline' : 'none';
        if (isFile) {
          valueInput.value = '';
          fileInfo.textContent = row.dataset.fileName || '未选择';
        }
      }
      typeSel.onchange = () => { row.dataset.fileBase64 = ''; row.dataset.fileName = ''; updateUI(); };
      fileBtn.onclick = () => fileInput.click();
      fileInput.onchange = function() {
        const f = this.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => { row.dataset.fileBase64 = r.result.split(',')[1] || ''; row.dataset.fileName = f.name; fileInfo.textContent = f.name; };
        r.readAsDataURL(f);
      };
      updateUI();
      row.querySelector('.remove-btn').onclick = () => row.remove();
      document.getElementById('formDataRows').appendChild(row);
    }

    function addFormUrlEncodedRow(item = { key: '', value: '' }) {
      const row = document.createElement('div');
      row.className = 'form-row';
      row.innerHTML = '<input type="text" placeholder="键" value="' + escapeHtml(item.key) + '"><input type="text" placeholder="值" value="' + escapeHtml(item.value) + '"><button class="btn remove-btn" type="button">删除</button>';
      row.querySelector('.remove-btn').onclick = () => row.remove();
      document.getElementById('formUrlEncodedRows').appendChild(row);
    }

    function collectFormData() {
      const items = [];
      document.querySelectorAll('#formDataRows .form-row').forEach(r => {
        const keyInput = r.querySelector('input[type="text"]');
        const key = keyInput ? keyInput.value.trim() : '';
        const typeSel = r.querySelector('.form-type');
        const valueInput = r.querySelector('.form-value');
        const type = typeSel ? typeSel.value : 'text';
        if (!key) return;
        items.push({
          key,
          value: type === 'text' ? (valueInput ? valueInput.value : '') : '',
          type,
          fileName: r.dataset.fileName || '',
          fileBase64: r.dataset.fileBase64 || ''
        });
      });
      return items;
    }

    function collectFormUrlEncoded() {
      const items = [];
      document.querySelectorAll('#formUrlEncodedRows .form-row').forEach(r => {
        const inputs = r.querySelectorAll('input');
        const key = inputs[0].value.trim();
        if (key) items.push({ key, value: inputs[1].value });
      });
      return items;
    }

    function getEditorValue(id) {
      const ed = editors[id];
      return ed ? ed.getValue() : '';
    }

    function setEditorValue(id, val) {
      const ed = editors[id];
      if (ed) ed.setValue(val || '');
    }

    function getSelectedBaseUrl() {
      const envId = urlEnvSelect.value;
      const env = environments.find(e => e.id === envId);
      return env ? env.baseUrl : '';
    }

    function getFullUrl() {
      const pathVal = urlPath.value.trim();
      const baseUrl = getSelectedBaseUrl();
      if (baseUrl) {
        const base = baseUrl.replace(/\/+$/, '');
        const path = pathVal.startsWith('/') ? pathVal : '/' + pathVal;
        return base + path;
      }
      return pathVal;
    }

    function getRequestPayload() {
      const payload = {
        url: getFullUrl(),
        method: methodSelect.value,
        headers: getHeaders(),
        bodyType: currentBodyType,
        body: '',
        formData: [],
        formUrlEncoded: [],
        binaryBase64: ''
      };
      switch (currentBodyType) {
        case 'form-data':
          payload.formData = collectFormData();
          break;
        case 'x-www-form-urlencoded':
          payload.formUrlEncoded = collectFormUrlEncoded();
          break;
        case 'json': payload.body = getEditorValue('json'); break;
        case 'xml': payload.body = getEditorValue('xml'); break;
        case 'raw': payload.body = getEditorValue('raw'); break;
        case 'binary': payload.binaryBase64 = binaryBase64; break;
        case 'graphql': payload.body = getEditorValue('graphql'); break;
      }
      return payload;
    }

    document.getElementById('addHeader').onclick = () => {
      const key = document.getElementById('headerPresetSelect').value.trim();
      if (!key) return;
      addHeaderRow(key, '');
      document.getElementById('headerPresetSelect').value = '';
    };
    document.getElementById('addCustomHeader').onclick = () => {
      const key = document.getElementById('headerCustomInput').value.trim();
      addHeaderRow(key, '');
      document.getElementById('headerCustomInput').value = '';
      const lastRow = headersEl.querySelector('.header-row:last-child');
      if (lastRow) {
        const valueInput = lastRow.querySelector('.header-value');
        if (valueInput) valueInput.focus();
      }
    };

    document.getElementById('addFormData').onclick = () => addFormDataRow();

    document.getElementById('addFormUrlEncoded').onclick = () => addFormUrlEncodedRow();

    document.getElementById('selectFile').onclick = () => document.getElementById('fileInput').click();

    document.getElementById('fileInput').onchange = function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const b64 = reader.result.split(',')[1] || '';
        binaryBase64 = b64;
        document.getElementById('fileName').textContent = file.name;
      };
      reader.readAsDataURL(file);
    };

    urlEnvSelect.onchange = () => {
      const envId = urlEnvSelect.value;
      if (envId) vscode.postMessage({ type: 'setCurrentEnvironment', envId });
    };

    document.getElementById('sendBtn').onclick = () => {
      vscode.postMessage({ type: 'sendRequest', ...getRequestPayload() });
    };

    document.getElementById('saveBtn').onclick = () => {
      vscode.postMessage({ type: 'saveRequest', ...getRequestPayload() });
    };

    let pendingInit = null;

    require.config({
      paths: { vs: MONACO_URI + '/vs' },
      'vs/nls': { availableLanguages: {} }
    });

    function applyMonacoTheme(theme) {
      if (typeof monaco !== 'undefined' && monaco.editor) monaco.editor.setTheme(theme || 'vs-dark');
    }

    require(['vs/editor/editor.main'], function() {
      const opts = {
        automaticLayout: true,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        fontSize: 12,
        theme: (typeof pendingInit !== 'undefined' && pendingInit && pendingInit.theme) || 'vs-dark'
      };
      editors.json = monaco.editor.create(document.getElementById('bodyJson'), { ...opts, language: 'json' });
      editors.xml = monaco.editor.create(document.getElementById('bodyXml'), { ...opts, language: 'xml' });
      editors.raw = monaco.editor.create(document.getElementById('bodyRaw'), { ...opts, language: 'plaintext' });
      editors.graphql = monaco.editor.create(document.getElementById('bodyGraphql'), { ...opts, language: 'json' });
      if (pendingInit) {
        const m = pendingInit;
        pendingInit = null;
        applyMonacoTheme(m.theme);
        environments = m.environments || [];
        if (environments.length > 0) {
          urlEnvSelect.innerHTML = environments.map(e => '<option value="' + escapeHtml(e.id) + '">' + escapeHtml(e.name) + ' - ' + escapeHtml(e.baseUrl) + '</option>').join('');
          urlEnvSelect.value = m.currentEnvId || (environments[0] && environments[0].id) || '';
          urlEnvSelect.classList.remove('hidden');
          urlPath.classList.add('with-base');
          urlPath.placeholder = '路径，如 /users 或 /api/users/1';
        } else {
          urlEnvSelect.classList.add('hidden');
          urlPath.classList.remove('with-base');
          urlPath.placeholder = 'https://api.example.com/path';
        }
        urlPath.value = m.path || '';
        methodSelect.value = m.method || 'GET';
        switchBodyType(m.bodyType || 'json');
        const bodyStr = m.body || '';
        setEditorValue('json', bodyStr);
        setEditorValue('xml', bodyStr);
        setEditorValue('raw', bodyStr);
        setEditorValue('graphql', bodyStr);
        if (m.binaryBase64) { binaryBase64 = m.binaryBase64; document.getElementById('fileName').textContent = '已选择文件'; }
        document.getElementById('formDataRows').innerHTML = '';
        (m.formData || []).forEach(item => addFormDataRow(item));
        document.getElementById('formUrlEncodedRows').innerHTML = '';
        (m.formUrlEncoded || []).forEach(item => addFormUrlEncodedRow(item));
        headersEl.innerHTML = '';
        const h = m.headers && typeof m.headers === 'object' ? m.headers : {};
        Object.entries(h).forEach(([k, v]) => addHeaderRow(k, v || ''));
      }
    });

    window.addEventListener('message', e => {
      const msg = e.data;
      if (msg.type === 'init') {
        if (!editors.json) { pendingInit = msg; return; }
        applyMonacoTheme(msg.theme);
        environments = msg.environments || [];
        if (environments.length > 0) {
          urlEnvSelect.innerHTML = environments.map(e => '<option value="' + escapeHtml(e.id) + '">' + escapeHtml(e.name) + ' - ' + escapeHtml(e.baseUrl) + '</option>').join('');
          urlEnvSelect.value = msg.currentEnvId || (environments[0] && environments[0].id) || '';
          urlEnvSelect.classList.remove('hidden');
          urlPath.classList.add('with-base');
          urlPath.placeholder = '路径，如 /users 或 /api/users/1';
        } else {
          urlEnvSelect.classList.add('hidden');
          urlPath.classList.remove('with-base');
          urlPath.placeholder = 'https://api.example.com/path';
        }
        urlPath.value = msg.path || '';
        methodSelect.value = msg.method || 'GET';
        switchBodyType(msg.bodyType || 'json');
        const bodyStr = msg.body || '';
        setEditorValue('json', bodyStr);
        setEditorValue('xml', bodyStr);
        setEditorValue('raw', bodyStr);
        setEditorValue('graphql', bodyStr);
        if (msg.binaryBase64) {
          binaryBase64 = msg.binaryBase64;
          document.getElementById('fileName').textContent = '已选择文件';
        }
        document.getElementById('formDataRows').innerHTML = '';
        (msg.formData || []).forEach(item => addFormDataRow(item));
        document.getElementById('formUrlEncodedRows').innerHTML = '';
        (msg.formUrlEncoded || []).forEach(item => addFormUrlEncodedRow(item));
        headersEl.innerHTML = '';
        const h = msg.headers && typeof msg.headers === 'object' ? msg.headers : {};
        Object.entries(h).forEach(([k, v]) => addHeaderRow(k, v || ''));
      } else if (msg.type === 'theme') {
        applyMonacoTheme(msg.theme);
      } else if (msg.type === 'response') {
        if (msg.error) {
          responseStatus.textContent = '错误: ' + msg.error;
          responseStatus.className = 'response-status error';
        } else {
          responseStatus.textContent = msg.status + ' ' + msg.statusText;
          responseStatus.className = 'response-status ' + (msg.status >= 200 && msg.status < 300 ? 'success' : 'error');
        }
        responseBody.textContent = msg.body || '(空)';
      }
    });
  </script>
</body>
</html>
