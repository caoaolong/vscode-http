<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP 请求</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      overflow: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar, body::-webkit-scrollbar {
      display: none;
    }
    body {
      margin: 0;
      padding: 20px 24px;
      font-family: var(--vscode-font-family);
      font-size: 13px;
      color: var(--vscode-foreground);
      background: var(--vscode-editor-background);
    }
    .section {
      margin-bottom: 24px;
      padding: 16px;
      background: var(--vscode-editor-inactiveSelectionBackground);
      border-radius: 8px;
      border: 1px solid var(--vscode-widget-border);
    }
    .section-title {
      font-weight: 600;
      font-size: 12px;
      margin-bottom: 12px;
      color: var(--vscode-foreground);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      opacity: 0.9;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }
    .method-select {
      width: 100px;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
    }
    .method-select:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .url-wrap { display: flex; flex: 1; align-items: center; gap: 0; min-width: 0; }
    .url-env-select {
      flex-shrink: 0;
      min-width: 140px;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-right: none;
      border-radius: 6px 0 0 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .url-env-select:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .url-env-select.hidden { display: none !important; }
    .url-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-size: 13px;
      min-width: 0;
    }
    .url-input.with-base { border-radius: 0 6px 6px 0; border-left: none; }
    .url-input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .req-name-label { flex: 0 0 40px; font-size: 12px; color: var(--vscode-descriptionForeground); }
    .req-name-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-size: 13px;
    }
    .req-name-input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .auth-section { margin-bottom: 24px; }
    .auth-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
    .auth-toggle-wrap { display: flex; align-items: center; gap: 8px; }
    .auth-type-select {
      min-width: 140px; padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .auth-params { margin-top: 10px; }
    .auth-params input {
      padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .auth-params input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .auth-params .auth-inline { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .auth-params .auth-inline label { min-width: 70px; font-size: 12px; color: var(--vscode-descriptionForeground); }
    .btn {
      padding: 8px 16px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    .btn:hover { background: var(--vscode-button-hoverBackground); opacity: 0.95; }
    .btn-secondary {
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
    }
    .btn-secondary:hover { background: var(--vscode-button-secondaryHoverBackground); }
    .header-row, .form-row, .query-param-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }
    .header-row input, .form-row input, .query-param-row input {
      padding: 6px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      font-size: 12px;
    }
    .header-row input:focus, .form-row input:focus, .query-param-row input:focus { outline: none; border-color: var(--vscode-focusBorder); }
    .form-row input:first-child { flex: 0 0 120px; }
    .header-key-wrap { position: relative; flex: 0 0 180px; }
    .header-key-wrap .header-key { width: 100%; }
    .header-dropdown {
      position: absolute; left: 0; right: 0; top: 100%; margin-top: 4px;
      max-height: 180px; overflow-y: auto; z-index: 1000;
      background: var(--vscode-dropdown-background);
      border: 1px solid var(--vscode-dropdown-border);
      border-radius: 6px;
      box-shadow: 0 8px 24px var(--vscode-widget-shadow);
    }
    .header-dropdown-option {
      padding: 6px 12px; cursor: pointer; font-size: 12px;
      color: var(--vscode-dropdown-foreground);
      transition: background 0.1s;
    }
    .header-dropdown-option:hover { background: var(--vscode-list-hoverBackground); }
    .form-row input:nth-child(2), .header-row .header-value, .query-param-row .query-param-value { flex: 1; }
    .form-row .type-select {
      width: 80px; flex: 0 0 80px; padding: 6px 10px;
      background: var(--vscode-input-background);
      color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
    }
    .header-add-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
    .header-add-actions .header-preset-select {
      min-width: 180px; padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .header-add-actions .header-custom-input {
      min-width: 120px; padding: 6px 10px;
      background: var(--vscode-input-background); color: var(--vscode-input-foreground);
      border: 1px solid var(--vscode-input-border); border-radius: 6px; font-size: 12px;
    }
    .header-add-actions .add-btn { margin-top: 0; }
    .add-btn { padding: 6px 12px; font-size: 12px; margin-top: 6px; }
    .remove-btn {
      padding: 6px 10px;
      background: transparent;
      color: var(--vscode-errorForeground);
      font-size: 12px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .remove-btn:hover { background: var(--vscode-inputValidation-errorBackground); }
    .body-type-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .body-type-tab {
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 6px;
      font-size: 12px;
      background: var(--vscode-button-secondaryBackground);
      color: var(--vscode-button-secondaryForeground);
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .body-type-tab:hover { background: var(--vscode-button-secondaryHoverBackground); }
    .body-type-tab.active {
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border-color: var(--vscode-focusBorder);
    }
    .body-panel { display: none; }
    .body-panel.active { display: block; }
    .monaco-container {
      width: 100%; height: 180px;
      border: 1px solid var(--vscode-input-border);
      border-radius: 8px;
      overflow: hidden;
    }
    .file-input-wrap {
      padding: 32px 24px;
      border: 2px dashed var(--vscode-input-border);
      border-radius: 8px;
      text-align: center;
      background: var(--vscode-input-background);
      transition: border-color 0.2s, background 0.2s;
    }
    .file-input-wrap:hover { border-color: var(--vscode-focusBorder); background: var(--vscode-list-hoverBackground); }
    .file-input-wrap #fileName { display: block; margin-top: 8px; font-size: 12px; color: var(--vscode-descriptionForeground); }
    .file-input-wrap input[type=file] { display: none; }
    .response-area {
      background: var(--vscode-textBlockQuote-background);
      border-radius: 8px;
      padding: 14px;
      border: 1px solid var(--vscode-widget-border);
    }
    .response-status {
      padding: 8px 0;
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .response-status.success { color: var(--vscode-testing-iconPassed); }
    .response-status.error { color: var(--vscode-errorForeground); }
    .request-full-wrap { margin-bottom: 14px; }
    .request-full-content {
      font-size: 11px; padding: 10px; margin: 0;
      background: var(--vscode-editor-background);
      border-radius: 6px; max-height: 280px; overflow-y: auto;
      border: 1px solid var(--vscode-input-border);
      white-space: pre-wrap; word-break: break-all;
      line-height: 1.45;
    }
    .response-headers-wrap { margin-bottom: 10px; }
    .response-headers {
      font-size: 11px; padding: 8px; margin: 0;
      background: var(--vscode-editor-background);
      border-radius: 6px; max-height: 160px; overflow-y: auto;
      border: 1px solid var(--vscode-input-border);
      white-space: pre-wrap; word-break: break-all;
    }
    .response-body {
      white-space: pre-wrap;
      word-break: break-all;
      padding: 12px;
      background: var(--vscode-editor-background);
      border-radius: 6px;
      max-height: 320px;
      overflow-y: auto;
      font-size: 12px;
      font-family: var(--vscode-editor-font-family);
      line-height: 1.5;
      border: 1px solid var(--vscode-input-border);
    }
    .body-response-layout {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }
    .body-response-layout .section {
      flex: 1;
      margin-bottom: 0;
      min-width: 0;
    }
    .body-response-layout .monaco-container {
      height: 280px;
    }
    .body-response-layout .response-body {
      min-height: 240px;
      max-height: 360px;
    }
    .response-body-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .response-body-header .response-body-label { font-size: 11px; color: var(--vscode-descriptionForeground); }
    .response-body-wrap { position: relative; }
    .response-body-wrap .btn-fullscreen {
      padding: 4px 10px; font-size: 11px; cursor: pointer;
      background: var(--vscode-button-secondaryBackground); color: var(--vscode-button-secondaryForeground);
      border: none; border-radius: 4px;
    }
    .response-body-wrap .btn-fullscreen:hover { opacity: 0.9; }
    #responseBodyFullscreen {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--vscode-editor-background);
      flex-direction: column;
      padding: 12px;
    }
    #responseBodyFullscreen.show { display: flex; }
    #responseBodyFullscreen .fullscreen-toolbar {
      flex-shrink: 0;
      display: flex; justify-content: flex-end; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    #responseBodyFullscreen .fullscreen-close {
      padding: 6px 14px;
      background: var(--vscode-button-background);
      color: var(--vscode-button-foreground);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    #responseBodyFullscreen .fullscreen-close:hover { opacity: 0.9; }
    #responseBodyFullscreen .fullscreen-body {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 12px;
      background: var(--vscode-editor-background);
      border: 1px solid var(--vscode-input-border);
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-all;
      font-size: 12px;
      font-family: var(--vscode-editor-font-family);
      line-height: 1.5;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    #responseBodyFullscreen .fullscreen-body::-webkit-scrollbar { display: none; }
    .scrollbar-hidden {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .scrollbar-hidden::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">请求</div>
    <div class="row">
      <label class="req-name-label">名称</label>
      <input type="text" class="req-name-input" id="requestName" placeholder="请求名称" />
    </div>
    <div class="row">
      <select class="method-select" id="method">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="PATCH">PATCH</option>
        <option value="DELETE">DELETE</option>
      </select>
      <div class="url-wrap">
        <select class="url-env-select hidden" id="urlEnvSelect" title="选择环境（baseUrl）"></select>
        <input type="text" class="url-input" id="urlPath" placeholder="路径，如 /users 或 /api/users/1" />
      </div>
      <button class="btn" id="sendBtn">发送</button>
      <button class="btn btn-secondary" id="saveBtn">保存</button>
      <button class="btn btn-secondary" id="saveAsInstanceBtn">保存为实例</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">请求参数</div>
    <div id="queryParamsRows"></div>
    <div class="header-add-actions">
      <button class="btn add-btn btn-secondary" id="addQueryParam">+ 添加参数</button>
    </div>
  </div>

  <div class="section auth-section">
    <div class="section-title">授权</div>
    <div class="auth-row">
      <div class="auth-toggle-wrap">
        <input type="checkbox" id="authEnabled" />
        <label for="authEnabled">启用授权</label>
      </div>
      <select class="auth-type-select" id="authType">
        <option value="bearer">Bearer Token</option>
        <option value="jwt">JWT Bearer</option>
        <option value="basic">Basic Auth</option>
        <option value="oauth2">OAuth 2.0</option>
        <option value="apiKey">Api Key</option>
        <option value="oauth1">OAuth 1.0</option>
      </select>
    </div>
    <div class="auth-params" id="authParams">
      <div class="auth-inline auth-bearer auth-jwt auth-oauth2">
        <label>Token</label>
        <input type="password" id="authToken" placeholder="Token" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-basic" style="display:none">
        <label>用户名</label>
        <input type="text" id="authUsername" placeholder="用户名" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-basic" style="display:none">
        <label>密码</label>
        <input type="password" id="authPassword" placeholder="密码" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-apiKey" style="display:none">
        <label>Header 名</label>
        <input type="text" id="authKeyName" placeholder="如 X-API-Key" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-apiKey" style="display:none">
        <label>值</label>
        <input type="password" id="authKeyValue" placeholder="值" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-oauth1" style="display:none">
        <label>Consumer Key</label>
        <input type="text" id="authConsumerKey" placeholder="Consumer Key" style="flex:1;min-width:0" />
      </div>
      <div class="auth-inline auth-oauth1" style="display:none">
        <label>Consumer Secret</label>
        <input type="password" id="authConsumerSecret" placeholder="Consumer Secret" style="flex:1;min-width:0" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">请求头</div>
    <div id="headers"></div>
    <div class="header-add-actions">
      <select class="header-preset-select" id="headerPresetSelect">
        <option value="">选择常用请求头...</option>
      </select>
      <button class="btn add-btn btn-secondary" id="addHeader">添加请求头</button>
      <input type="text" class="header-custom-input" id="headerCustomInput" placeholder="自定义请求头名" />
      <button class="btn add-btn btn-secondary" id="addCustomHeader">添加自定义头</button>
    </div>
  </div>

  <div class="body-response-layout">
  <div class="section">
    <div class="section-title">请求体</div>
    <div class="body-type-tabs">
      <button class="body-type-tab" data-type="form-data">form-data</button>
      <button class="body-type-tab" data-type="x-www-form-urlencoded">x-www-form-urlencoded</button>
      <button class="body-type-tab active" data-type="json">JSON</button>
      <button class="body-type-tab" data-type="xml">XML</button>
      <button class="body-type-tab" data-type="raw">Raw</button>
      <button class="body-type-tab" data-type="binary">Binary</button>
      <button class="body-type-tab" data-type="graphql">GraphQL</button>
    </div>

    <div id="panel-form-data" class="body-panel">
      <div id="formDataRows"></div>
      <button class="btn add-btn btn-secondary" id="addFormData">+ 添加字段</button>
    </div>

    <div id="panel-x-www-form-urlencoded" class="body-panel">
      <div id="formUrlEncodedRows"></div>
      <button class="btn add-btn btn-secondary" id="addFormUrlEncoded">+ 添加字段</button>
    </div>

    <div id="panel-json" class="body-panel active">
      <div id="bodyJson" class="monaco-container"></div>
    </div>

    <div id="panel-xml" class="body-panel">
      <div id="bodyXml" class="monaco-container"></div>
    </div>

    <div id="panel-raw" class="body-panel">
      <div id="bodyRaw" class="monaco-container"></div>
    </div>

    <div id="panel-binary" class="body-panel">
      <div class="file-input-wrap">
        <input type="file" id="fileInput" />
        <span id="fileName">选择文件...</span>
        <button class="btn add-btn btn-secondary" id="selectFile" style="margin-top:8px">选择文件</button>
      </div>
    </div>

    <div id="panel-graphql" class="body-panel">
      <div id="bodyGraphql" class="monaco-container"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">响应</div>
    <div class="response-area">
      <details class="request-full-wrap" id="requestFullWrap">
        <summary style="font-size:11px;margin-bottom:6px;color:var(--vscode-descriptionForeground);cursor:pointer">完整请求</summary>
        <pre class="request-full-content scrollbar-hidden" id="requestFullContent">发送请求后将显示完整请求内容</pre>
      </details>
      <div class="response-status" id="responseStatus">未发送</div>
      <details class="response-headers-wrap" id="responseHeadersWrap" style="display:none">
        <summary style="font-size:11px;margin-bottom:6px;color:var(--vscode-descriptionForeground);cursor:pointer">响应头</summary>
        <pre class="response-headers scrollbar-hidden" id="responseHeaders"></pre>
      </details>
      <div class="response-body-wrap">
        <div class="response-body-header">
          <span class="response-body-label">响应体</span>
          <button type="button" class="btn-fullscreen" id="responseBodyFullscreenBtn">全屏查看</button>
        </div>
        <pre class="response-body scrollbar-hidden" id="responseBody">发送请求后显示响应</pre>
      </div>
      <div id="responseBodyFullscreen">
        <div class="fullscreen-toolbar">
          <button type="button" class="fullscreen-close" id="responseBodyFullscreenClose">退出全屏</button>
        </div>
        <pre class="fullscreen-body scrollbar-hidden" id="responseBodyFullscreenContent"></pre>
      </div>
    </div>
  </div>
  </div>

  <script src="{{MONACO_URI}}/vs/loader.js"></script>
  <script>
    const MONACO_URI = '{{MONACO_URI}}';
    const vscode = acquireVsCodeApi();

    let currentBodyType = 'json';
    let binaryBase64 = '';
    let editors = { json: null, xml: null, raw: null, graphql: null };

    const methodSelect = document.getElementById('method');
    const urlEnvSelect = document.getElementById('urlEnvSelect');
    const urlPath = document.getElementById('urlPath');
    const requestNameEl = document.getElementById('requestName');
    let environments = [];
    const headersEl = document.getElementById('headers');
    const queryParamsEl = document.getElementById('queryParamsRows');

    const authTypeSelect = document.getElementById('authType');
    const authEnabledCheck = document.getElementById('authEnabled');
    function updateAuthParamsVisibility() {
      const type = authTypeSelect.value;
      document.querySelectorAll('.auth-params .auth-inline').forEach(el => {
        el.style.display = el.classList.contains('auth-' + type) ? '' : 'none';
      });
    }
    authTypeSelect.onchange = updateAuthParamsVisibility;
    authEnabledCheck.onchange = () => {
      document.getElementById('authParams').style.opacity = authEnabledCheck.checked ? '1' : '0.5';
    };
    updateAuthParamsVisibility();

    function getAuthConfig() {
      if (!authEnabledCheck.checked) return { enabled: false, type: authTypeSelect.value };
      const type = authTypeSelect.value;
      const cfg = { enabled: true, type: type };
      if (type === 'bearer' || type === 'jwt' || type === 'oauth2') {
        cfg.token = document.getElementById('authToken').value.trim();
        if (type === 'oauth2') cfg.accessToken = cfg.token;
      } else if (type === 'basic') {
        cfg.username = document.getElementById('authUsername').value.trim();
        cfg.password = document.getElementById('authPassword').value;
      } else if (type === 'apiKey') {
        cfg.keyName = document.getElementById('authKeyName').value.trim() || 'X-API-Key';
        cfg.value = document.getElementById('authKeyValue').value;
      } else if (type === 'oauth1') {
        cfg.consumerKey = document.getElementById('authConsumerKey').value.trim();
        cfg.consumerSecret = document.getElementById('authConsumerSecret').value;
      }
      return cfg;
    }

    function getAuthHeaders() {
      const cfg = getAuthConfig();
      if (!cfg.enabled) return {};
      const type = cfg.type;
      if (type === 'bearer' || type === 'jwt' || type === 'oauth2') {
        const t = (cfg.token || cfg.accessToken || '').trim();
        return t ? { 'Authorization': 'Bearer ' + t } : {};
      }
      if (type === 'basic' && cfg.username) {
        const raw = cfg.username + ':' + (cfg.password || '');
        try {
          return { 'Authorization': 'Basic ' + btoa(unescape(encodeURIComponent(raw))) };
        } catch (e) {
          return {};
        }
      }
      if (type === 'apiKey' && cfg.keyName && cfg.value !== undefined) {
        return { [cfg.keyName]: cfg.value };
      }
      if (type === 'oauth1') {
        return {};
      }
      return {};
    }

    function applyAuthConfig(cfg) {
      if (!cfg || !cfg.enabled) {
        authEnabledCheck.checked = false;
        document.getElementById('authParams').style.opacity = '0.5';
        return;
      }
      authEnabledCheck.checked = true;
      document.getElementById('authParams').style.opacity = '1';
      authTypeSelect.value = cfg.type || 'bearer';
      updateAuthParamsVisibility();
      if (cfg.token !== undefined) document.getElementById('authToken').value = cfg.token;
      if (cfg.accessToken !== undefined) document.getElementById('authToken').value = cfg.accessToken;
      if (cfg.username !== undefined) document.getElementById('authUsername').value = cfg.username;
      if (cfg.password !== undefined) document.getElementById('authPassword').value = cfg.password;
      if (cfg.keyName !== undefined) document.getElementById('authKeyName').value = cfg.keyName;
      if (cfg.value !== undefined) document.getElementById('authKeyValue').value = cfg.value;
      if (cfg.consumerKey !== undefined) document.getElementById('authConsumerKey').value = cfg.consumerKey;
      if (cfg.consumerSecret !== undefined) document.getElementById('authConsumerSecret').value = cfg.consumerSecret;
    }
    const responseStatus = document.getElementById('responseStatus');
    const responseBody = document.getElementById('responseBody');
    const responseHeadersEl = document.getElementById('responseHeaders');
    /** 最近一次响应的完整数据，用于「保存为实例」 */
    let lastResponsePayload = null;
    const responseHeadersWrap = document.getElementById('responseHeadersWrap');
    const requestFullContent = document.getElementById('requestFullContent');
    const sendBtn = document.getElementById('sendBtn');

    function formatFullRequest(payload) {
      const lines = [payload.method + ' ' + payload.url, ''];
      const headers = payload.headers || {};
      Object.entries(headers).forEach(([k, v]) => { lines.push(k + ': ' + (v || '')); });
      lines.push('');
      let bodyStr = '';
      switch (payload.bodyType) {
        case 'form-data':
          bodyStr = (payload.formData || []).map(i => i.key + (i.type === 'file' ? '=[文件]' : '=' + (i.value || ''))).join('\n') || '(无)';
          break;
        case 'x-www-form-urlencoded': {
          const params = (payload.formUrlEncoded || []).filter(i => i.key).map(i => i.key + '=' + encodeURIComponent(i.value || ''));
          bodyStr = params.join('&') || '(无)';
          break;
        }
        case 'binary':
          bodyStr = payload.binaryBase64 ? '(二进制, base64 长度 ' + payload.binaryBase64.length + ')' : '(无)';
          break;
        default:
          bodyStr = (payload.body && payload.body.trim()) || '(无)';
      }
      lines.push(bodyStr);
      return lines.join('\n');
    }

    function setSendLoading(loading) {
      sendBtn.disabled = loading;
      sendBtn.textContent = loading ? '发送中…' : '发送';
    }

    function formatResponseBody(bodyStr) {
      if (!bodyStr || bodyStr === '(空)') return bodyStr || '(空)';
      const trimmed = bodyStr.trim();
      if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
        try {
          return JSON.stringify(JSON.parse(bodyStr), null, 2);
        } catch (_) { return bodyStr; }
        }
      return bodyStr;
    }

    function getBodyPanels() {
      return {
        'form-data': document.getElementById('panel-form-data'),
        'x-www-form-urlencoded': document.getElementById('panel-x-www-form-urlencoded'),
        'json': document.getElementById('panel-json'),
        'xml': document.getElementById('panel-xml'),
        'raw': document.getElementById('panel-raw'),
        'binary': document.getElementById('panel-binary'),
        'graphql': document.getElementById('panel-graphql')
      };
    }

    function switchBodyType(type) {
      currentBodyType = type;
      document.querySelectorAll('.body-type-tab').forEach(t => t.classList.remove('active'));
      document.querySelector('[data-type="' + type + '"]').classList.add('active');
      Object.entries(getBodyPanels()).forEach(([k, el]) => {
        el.classList.toggle('active', k === type);
      });
    }

    document.querySelectorAll('.body-type-tab').forEach(tab => {
      tab.onclick = () => switchBodyType(tab.dataset.type);
    });

    function getHeaders() {
      const h = {};
      headersEl.querySelectorAll('.header-row').forEach(r => {
        const keyInput = r.querySelector('.header-key');
        const valueInput = r.querySelector('.header-value');
        const k = keyInput ? keyInput.value.trim() : '';
        const v = valueInput ? valueInput.value.trim() : '';
        if (k) h[k] = v;
      });
      return h;
    }

    const COMMON_HEADERS = ['Accept','Accept-Charset','Accept-Encoding','Accept-Language','Authorization','Cache-Control','Content-Type','Cookie','Host','Origin','Referer','User-Agent','X-API-Key','X-Auth-Token','X-Requested-With','X-CSRF-Token'];

    (function initHeaderPresetSelect() {
      const sel = document.getElementById('headerPresetSelect');
      COMMON_HEADERS.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h;
        opt.textContent = h;
        sel.appendChild(opt);
      });
    })();

    function addQueryParamRow(key = '', value = '') {
      const row = document.createElement('div');
      row.className = 'query-param-row';
      row.innerHTML = '<input type="text" placeholder="参数名" value="' + escapeHtml(key) + '"><input type="text" class="query-param-value" placeholder="值" value="' + escapeHtml(value) + '"><button class="btn remove-btn" type="button">删除</button>';
      row.querySelector('.remove-btn').onclick = () => row.remove();
      queryParamsEl.appendChild(row);
    }

    function collectQueryParams() {
      const list = [];
      queryParamsEl.querySelectorAll('.query-param-row').forEach(r => {
        const inputs = r.querySelectorAll('input');
        const k = inputs[0] ? inputs[0].value.trim() : '';
        if (k) list.push({ key: k, value: inputs[1] ? inputs[1].value : '' });
      });
      return list;
    }

    /** 解析 URL 中 query 并保持参数顺序 */
    function parseQueryFromPath(pathStr) {
      const pathOnly = pathStr.includes('?') ? pathStr.split('?')[0] : pathStr;
      const queryStr = pathStr.includes('?') ? pathStr.slice(pathStr.indexOf('?') + 1) : '';
      const params = [];
      if (queryStr) {
        queryStr.split('&').forEach(pair => {
          const eq = pair.indexOf('=');
          const key = eq >= 0 ? decodeURIComponent(pair.slice(0, eq).replace(/\+/g, ' ')) : decodeURIComponent(pair.replace(/\+/g, ' '));
          const value = eq >= 0 ? decodeURIComponent(pair.slice(eq + 1).replace(/\+/g, ' ')) : '';
          params.push({ key, value });
        });
      }
      return { pathOnly, params };
    }

    function applyPathAndQuery(pathStr) {
      if (!pathStr) {
        urlPath.value = '';
        queryParamsEl.innerHTML = '';
        return;
      }
      const { pathOnly, params } = parseQueryFromPath(pathStr);
      urlPath.value = pathOnly;
      queryParamsEl.innerHTML = '';
      params.forEach(p => addQueryParamRow(p.key, p.value));
    }

    function addHeaderRow(key = '', value = '') {
      const row = document.createElement('div');
      row.className = 'header-row';
      row.innerHTML = '<div class="header-key-wrap"><input type="text" class="header-key" placeholder="选择或输入请求头" value="' + escapeHtml(key) + '"><div class="header-dropdown" style="display:none"></div></div><input type="text" class="header-value" placeholder="值" value="' + escapeHtml(value) + '"><button class="btn remove-btn" type="button">删除</button>';
      const keyWrap = row.querySelector('.header-key-wrap');
      const keyInput = row.querySelector('.header-key');
      const dropdown = row.querySelector('.header-dropdown');
      function filterOptions() {
        const q = keyInput.value.trim().toLowerCase();
        const opts = q ? COMMON_HEADERS.filter(h => h.toLowerCase().includes(q)) : COMMON_HEADERS;
        dropdown.innerHTML = opts.map(h => '<div class="header-dropdown-option">' + escapeHtml(h) + '</div>').join('');
        dropdown.style.display = opts.length ? 'block' : 'none';
        dropdown.querySelectorAll('.header-dropdown-option').forEach(el => {
          el.onclick = () => { keyInput.value = el.textContent; dropdown.style.display = 'none'; keyInput.focus(); };
        });
      }
      keyInput.onfocus = filterOptions;
      keyInput.oninput = filterOptions;
      keyInput.onblur = () => setTimeout(() => dropdown.style.display = 'none', 150);
      row.querySelector('.remove-btn').onclick = () => row.remove();
      headersEl.appendChild(row);
    }

    function escapeHtml(s) {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    function addFormDataRow(item = { key: '', value: '', type: 'text', fileName: '', fileBase64: '' }) {
      const row = document.createElement('div');
      row.className = 'form-row';
      const typeOpts = '<option value="text"' + (item.type === 'text' ? ' selected' : '') + '>文本</option><option value="file"' + (item.type === 'file' ? ' selected' : '') + '>文件</option>';
      row.innerHTML = '<input type="text" placeholder="键" value="' + escapeHtml(item.key) + '"><input type="text" placeholder="值" class="form-value" value="' + escapeHtml(item.type === 'text' ? item.value : '') + '"><span class="form-file-info" style="display:none;flex:1;font-size:12px;color:var(--vscode-descriptionForeground)"></span><input type="file" class="form-file-input" style="display:none"><button class="btn add-btn btn-secondary form-file-btn" style="display:none" type="button">选择文件</button><select class="type-select form-type">' + typeOpts + '</select><button class="btn remove-btn" type="button">删除</button>';
      const typeSel = row.querySelector('.form-type');
      const valueInput = row.querySelector('.form-value');
      const fileInfo = row.querySelector('.form-file-info');
      const fileInput = row.querySelector('.form-file-input');
      const fileBtn = row.querySelector('.form-file-btn');
      row.dataset.fileBase64 = item.fileBase64 || '';
      row.dataset.fileName = item.fileName || '';
      function updateUI() {
        const isFile = typeSel.value === 'file';
        valueInput.style.display = isFile ? 'none' : '';
        fileInfo.style.display = isFile ? 'inline' : 'none';
        fileBtn.style.display = isFile ? 'inline' : 'none';
        if (isFile) {
          valueInput.value = '';
          fileInfo.textContent = row.dataset.fileName || '未选择';
        }
      }
      typeSel.onchange = () => { row.dataset.fileBase64 = ''; row.dataset.fileName = ''; updateUI(); };
      fileBtn.onclick = () => fileInput.click();
      fileInput.onchange = function() {
        const f = this.files[0];
        if (!f) return;
        const r = new FileReader();
        r.onload = () => { row.dataset.fileBase64 = r.result.split(',')[1] || ''; row.dataset.fileName = f.name; fileInfo.textContent = f.name; };
        r.readAsDataURL(f);
      };
      updateUI();
      row.querySelector('.remove-btn').onclick = () => row.remove();
      document.getElementById('formDataRows').appendChild(row);
    }

    function addFormUrlEncodedRow(item = { key: '', value: '' }) {
      const row = document.createElement('div');
      row.className = 'form-row';
      row.innerHTML = '<input type="text" placeholder="键" value="' + escapeHtml(item.key) + '"><input type="text" placeholder="值" value="' + escapeHtml(item.value) + '"><button class="btn remove-btn" type="button">删除</button>';
      row.querySelector('.remove-btn').onclick = () => row.remove();
      document.getElementById('formUrlEncodedRows').appendChild(row);
    }

    function collectFormData() {
      const items = [];
      document.querySelectorAll('#formDataRows .form-row').forEach(r => {
        const keyInput = r.querySelector('input[type="text"]');
        const key = keyInput ? keyInput.value.trim() : '';
        const typeSel = r.querySelector('.form-type');
        const valueInput = r.querySelector('.form-value');
        const type = typeSel ? typeSel.value : 'text';
        if (!key) return;
        items.push({
          key,
          value: type === 'text' ? (valueInput ? valueInput.value : '') : '',
          type,
          fileName: r.dataset.fileName || '',
          fileBase64: r.dataset.fileBase64 || ''
        });
      });
      return items;
    }

    function collectFormUrlEncoded() {
      const items = [];
      document.querySelectorAll('#formUrlEncodedRows .form-row').forEach(r => {
        const inputs = r.querySelectorAll('input');
        const key = inputs[0].value.trim();
        if (key) items.push({ key, value: inputs[1].value });
      });
      return items;
    }

    function getEditorValue(id) {
      const ed = editors[id];
      return ed ? ed.getValue() : '';
    }

    function setEditorValue(id, val) {
      const ed = editors[id];
      if (ed) ed.setValue(val || '');
    }

    function getSelectedBaseUrl() {
      const envId = urlEnvSelect.value;
      const env = environments.find(e => e.id === envId);
      return env ? env.baseUrl : '';
    }

    function getFullUrl() {
      let pathVal = urlPath.value.trim();
      const params = collectQueryParams();
      if (params.length > 0) {
        const pathOnly = pathVal.includes('?') ? pathVal.split('?')[0] : pathVal;
        const query = params.map(p => encodeURIComponent(p.key) + '=' + encodeURIComponent(p.value)).join('&');
        pathVal = pathOnly + (query ? '?' + query : '');
      }
      const baseUrl = getSelectedBaseUrl();
      if (baseUrl) {
        const base = baseUrl.replace(/\/+$/, '');
        const path = pathVal.startsWith('/') ? pathVal : '/' + pathVal;
        return base + path;
      }
      return pathVal;
    }

    function getRequestPayload() {
      const headers = getHeaders();
      const authHeaders = getAuthHeaders();
      for (const k in authHeaders) headers[k] = authHeaders[k];
      const payload = {
        url: getFullUrl(),
        method: methodSelect.value,
        headers: headers,
        name: requestNameEl.value.trim(),
        auth: getAuthConfig(),
        bodyType: currentBodyType,
        body: '',
        formData: [],
        formUrlEncoded: [],
        binaryBase64: ''
      };
      switch (currentBodyType) {
        case 'form-data':
          payload.formData = collectFormData();
          break;
        case 'x-www-form-urlencoded':
          payload.formUrlEncoded = collectFormUrlEncoded();
          break;
        case 'json': payload.body = getEditorValue('json'); break;
        case 'xml': payload.body = getEditorValue('xml'); break;
        case 'raw': payload.body = getEditorValue('raw'); break;
        case 'binary': payload.binaryBase64 = binaryBase64; break;
        case 'graphql': payload.body = getEditorValue('graphql'); break;
      }
      return payload;
    }

    document.getElementById('addQueryParam').onclick = () => addQueryParamRow();

    document.getElementById('addHeader').onclick = () => {
      const key = document.getElementById('headerPresetSelect').value.trim();
      if (!key) return;
      addHeaderRow(key, '');
      document.getElementById('headerPresetSelect').value = '';
    };
    document.getElementById('addCustomHeader').onclick = () => {
      const key = document.getElementById('headerCustomInput').value.trim();
      addHeaderRow(key, '');
      document.getElementById('headerCustomInput').value = '';
      const lastRow = headersEl.querySelector('.header-row:last-child');
      if (lastRow) {
        const valueInput = lastRow.querySelector('.header-value');
        if (valueInput) valueInput.focus();
      }
    };

    document.getElementById('addFormData').onclick = () => addFormDataRow();

    document.getElementById('addFormUrlEncoded').onclick = () => addFormUrlEncodedRow();

    document.getElementById('selectFile').onclick = () => document.getElementById('fileInput').click();

    document.getElementById('fileInput').onchange = function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const b64 = reader.result.split(',')[1] || '';
        binaryBase64 = b64;
        document.getElementById('fileName').textContent = file.name;
      };
      reader.readAsDataURL(file);
    };

    urlEnvSelect.onchange = () => {
      const envId = urlEnvSelect.value;
      if (envId) vscode.postMessage({ type: 'setCurrentEnvironment', envId });
    };

    sendBtn.onclick = () => {
      const url = getFullUrl();
      if (!url || !url.trim()) {
        responseStatus.textContent = '请填写请求 URL';
        responseStatus.className = 'response-status error';
        return;
      }
      try {
        new URL(url);
      } catch (_) {
        responseStatus.textContent = 'URL 格式无效';
        responseStatus.className = 'response-status error';
        return;
      }
      setSendLoading(true);
      responseStatus.textContent = '发送中…';
      responseStatus.className = 'response-status';
      const payload = getRequestPayload();
      requestFullContent.textContent = formatFullRequest(payload);
      requestFullContent.parentElement.open = true;
      vscode.postMessage({ type: 'sendRequest', ...payload });
    };

    document.getElementById('saveBtn').onclick = () => {
      vscode.postMessage({ type: 'saveRequest', ...getRequestPayload() });
    };

    (function initResponseBodyFullscreen() {
      const overlay = document.getElementById('responseBodyFullscreen');
      const content = document.getElementById('responseBodyFullscreenContent');
      const btn = document.getElementById('responseBodyFullscreenBtn');
      const closeBtn = document.getElementById('responseBodyFullscreenClose');
      function openFullscreen() {
        content.textContent = responseBody.textContent || '(空)';
        overlay.classList.add('show');
      }
      function closeFullscreen() {
        overlay.classList.remove('show');
      }
      btn.onclick = openFullscreen;
      closeBtn.onclick = closeFullscreen;
      overlay.onclick = function(e) {
        if (e.target === overlay) closeFullscreen();
      };
    })();

    let pendingInit = null;

    require.config({
      paths: { vs: MONACO_URI + '/vs' },
      'vs/nls': { availableLanguages: {} }
    });

    function applyMonacoTheme(theme) {
      if (typeof monaco !== 'undefined' && monaco.editor) monaco.editor.setTheme(theme || 'vs-dark');
    }

    require(['vs/editor/editor.main'], function() {
      const opts = {
        automaticLayout: true,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        fontSize: 12,
        theme: (typeof pendingInit !== 'undefined' && pendingInit && pendingInit.theme) || 'vs-dark'
      };
      editors.json = monaco.editor.create(document.getElementById('bodyJson'), { ...opts, language: 'json' });
      editors.xml = monaco.editor.create(document.getElementById('bodyXml'), { ...opts, language: 'xml' });
      editors.raw = monaco.editor.create(document.getElementById('bodyRaw'), { ...opts, language: 'plaintext' });
      editors.graphql = monaco.editor.create(document.getElementById('bodyGraphql'), { ...opts, language: 'json' });
      if (pendingInit) {
        const m = pendingInit;
        pendingInit = null;
        applyMonacoTheme(m.theme);
        environments = m.environments || [];
        if (environments.length > 0) {
          urlEnvSelect.innerHTML = environments.map(e => '<option value="' + escapeHtml(e.id) + '">' + escapeHtml(e.name) + ' - ' + escapeHtml(e.baseUrl) + '</option>').join('');
          urlEnvSelect.value = m.currentEnvId || (environments[0] && environments[0].id) || '';
          urlEnvSelect.classList.remove('hidden');
          urlPath.classList.add('with-base');
          urlPath.placeholder = '路径，如 /users 或 /api/users/1';
        } else {
          urlEnvSelect.classList.add('hidden');
          urlPath.classList.remove('with-base');
          urlPath.placeholder = 'https://api.example.com/path';
        }
        applyPathAndQuery(m.path || '');
        if (requestNameEl) requestNameEl.value = m.name || '';
        methodSelect.value = m.method || 'GET';
        applyAuthConfig(m.auth);
        switchBodyType(m.bodyType || 'json');
        const bodyStr = m.body || '';
        setEditorValue('json', bodyStr);
        setEditorValue('xml', bodyStr);
        setEditorValue('raw', bodyStr);
        setEditorValue('graphql', bodyStr);
        if (m.binaryBase64) { binaryBase64 = m.binaryBase64; document.getElementById('fileName').textContent = '已选择文件'; }
        document.getElementById('formDataRows').innerHTML = '';
        (m.formData || []).forEach(item => addFormDataRow(item));
        document.getElementById('formUrlEncodedRows').innerHTML = '';
        (m.formUrlEncoded || []).forEach(item => addFormUrlEncodedRow(item));
        headersEl.innerHTML = '';
        const h = m.headers && typeof m.headers === 'object' ? m.headers : {};
        Object.entries(h).forEach(([k, v]) => addHeaderRow(k, v || ''));
      }
    });

    window.addEventListener('message', e => {
      const msg = e.data;
      if (msg.type === 'init') {
        if (!editors.json) { pendingInit = msg; return; }
        applyMonacoTheme(msg.theme);
        environments = msg.environments || [];
        if (environments.length > 0) {
          urlEnvSelect.innerHTML = environments.map(e => '<option value="' + escapeHtml(e.id) + '">' + escapeHtml(e.name) + ' - ' + escapeHtml(e.baseUrl) + '</option>').join('');
          urlEnvSelect.value = msg.currentEnvId || (environments[0] && environments[0].id) || '';
          urlEnvSelect.classList.remove('hidden');
          urlPath.classList.add('with-base');
          urlPath.placeholder = '路径，如 /users 或 /api/users/1';
        } else {
          urlEnvSelect.classList.add('hidden');
          urlPath.classList.remove('with-base');
          urlPath.placeholder = 'https://api.example.com/path';
        }
        applyPathAndQuery(msg.path || '');
        if (requestNameEl) requestNameEl.value = msg.name || '';
        methodSelect.value = msg.method || 'GET';
        applyAuthConfig(msg.auth);
        switchBodyType(msg.bodyType || 'json');
        const bodyStr = msg.body || '';
        setEditorValue('json', bodyStr);
        setEditorValue('xml', bodyStr);
        setEditorValue('raw', bodyStr);
        setEditorValue('graphql', bodyStr);
        if (msg.binaryBase64) {
          binaryBase64 = msg.binaryBase64;
          document.getElementById('fileName').textContent = '已选择文件';
        }
        document.getElementById('formDataRows').innerHTML = '';
        (msg.formData || []).forEach(item => addFormDataRow(item));
        document.getElementById('formUrlEncodedRows').innerHTML = '';
        (msg.formUrlEncoded || []).forEach(item => addFormUrlEncodedRow(item));
        headersEl.innerHTML = '';
        const h = msg.headers && typeof msg.headers === 'object' ? msg.headers : {};
        Object.entries(h).forEach(([k, v]) => addHeaderRow(k, v || ''));
      } else if (msg.type === 'theme') {
        applyMonacoTheme(msg.theme);
      } else if (msg.type === 'response') {
        setSendLoading(false);
        if (msg.error) {
          responseStatus.textContent = '错误: ' + msg.error;
          responseStatus.className = 'response-status error';
          responseHeadersWrap.style.display = 'none';
      } else {
        responseStatus.textContent = msg.status + ' ' + msg.statusText;
        responseStatus.className = 'response-status ' + (msg.status >= 200 && msg.status < 300 ? 'success' : 'error');
        if (msg.headers && Object.keys(msg.headers).length > 0) {
          responseHeadersWrap.style.display = 'block';
          responseHeadersEl.textContent = Object.entries(msg.headers).map(([k, v]) => k + ': ' + v).join('\n');
        } else {
          responseHeadersWrap.style.display = 'none';
        }
      }
      responseBody.textContent = formatResponseBody(msg.body || '(空)');
      lastResponsePayload = { status: msg.status, statusText: msg.statusText || '', headers: msg.headers || {}, body: msg.body || '', error: msg.error };
      }
  });

    document.getElementById('saveAsInstanceBtn').onclick = () => {
      if (!lastResponsePayload) {
        responseStatus.textContent = '请先发送请求后再保存为实例';
        responseStatus.className = 'response-status error';
        return;
      }
      vscode.postMessage({
        type: 'saveAsInstance',
        requestPayload: getRequestPayload(),
        responsePayload: lastResponsePayload
      });
    };
  </script>
</body>
</html>
